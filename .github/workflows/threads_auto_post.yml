name: Threads自動投稿 - さきキャメロン

on:
  workflow_dispatch:  # cron-job.org からHTTPで呼び出す

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    name: さきキャメロンThreads投稿
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install requests anthropic
      - env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python post_to_threads.py

      - name: Commit video history (skip ci)
        if: success()
        run: |
          if [ -n "$(git status --porcelain state/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/
            git commit -m "Update video history [skip ci]"
            git push
          else
            echo "state変更なし"
          fi

