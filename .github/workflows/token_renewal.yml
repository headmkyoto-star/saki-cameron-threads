name: さきキャメロン トークン自動更新

on:
  schedule:
    - cron: "0 0 1 * *"   # 毎月1日 UTC 0:00 (JST 9:00)
  workflow_dispatch:

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests PyNaCl -q

      - name: Refresh Threads Token & Update Secret
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python3 scripts/refresh_token.py
